openapi: 3.0.0
info:
  title: CAPS Backend API
  description: Cloud-AI Pedestrian Safety Analysis Platform Backend API
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local Development Server
paths:
  /api/status:
    get:
      summary: 시스템 상태 조회
      description: 백엔드 시스템의 현재 작동 상태 및 타임스탬프를 반환합니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "정상"
                  timestamp:
                    type: string
                    format: date-time

  /api/upload:
    post:
      summary: 영상 업로드 및 분석 요청
      description: 비디오 파일을 업로드하고 AI 분석 태스크를 큐에 등록합니다.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 업로드 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  file_id:
                    type: string

  /api/results:
    get:
      summary: 분석 결과 조회
      description: 저장된 AI 분석 결과를 필터링하여 조회합니다.
      parameters:
        - name: filename
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: tenant_id
          in: query
          schema:
            type: string
            default: default
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnalysisResult'

  /api/alerts:
    get:
      summary: 최근 알림 조회
      description: 시스템에서 발생한 최근 위험 알림 목록을 반환합니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/devices:
    get:
      summary: 장치 목록 조회
      description: 등록된 감시 장치(카메라 등)의 목록과 상태를 조회합니다.
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'

  /api/v1/external/events:
    get:
      summary: 외부 긴급구조 시스템 API
      description: 119, 경찰 등 외부 기관을 위한 긴급 이벤트 데이터 제공 API
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /api/v1/v2x/messages:
    get:
      summary: V2X PSM 메시지 조회
      description: 자율주행 차량 연동을 위한 PSM(Personal Safety Message) 규격 데이터
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    Device:
      type: object
      properties:
        id:
          type: string
        location:
          type: string
        status:
          type: string
        object_count:
          type: int
    AnalysisResult:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: string
        file_id:
          type: string
        filename:
          type: string
        analysis_data:
          type: object
        processed_file_id:
          type: string
        created_at:
          type: string
          format: date-time
